<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>わんこ とけいタッチ</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="時計クイズ">
      <div class="topbar">
        <div>
          <p class="eyebrow">三択タッチパネル</p>
          <h1>わんこ とけいタッチ</h1>
        </div>
        <div class="score" aria-live="polite">
          <span>せいかい</span>
          <strong id="score">0</strong>
        </div>
      </div>

      <div class="play-area">
        <div class="dog-panel">
          <div id="dog" class="dog" aria-hidden="true">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="face">
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="nose"></div>
              <div class="mouth"></div>
            </div>
          </div>
          <p id="message" class="message">この時計は なんじ？</p>
        </div>

        <div class="clock-wrap">
          <div id="targetTime" class="target-time"></div>
          <button id="nextBtn" class="next" type="button">つぎの もんだい</button>
        </div>
      </div>

      <div id="choices" class="choices" aria-label="時刻の選択肢"></div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
